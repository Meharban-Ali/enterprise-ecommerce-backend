spring.application.name=ecommerce
server.port=${PORT:8090}

# ===== SWAGGER/OPENAPI CONFIGURATION =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===== JACKSON SERIALIZATION CONFIGURATION =====
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== MULTIPART FILE UPLOAD LIMITS =====
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ===== JAVA 21 VIRTUAL THREADS CONFIGURATION =====
spring.threads.virtual.enabled=true

# ===== LETTUCE REDIS CLIENT POOL CONFIGURATION =====
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms
spring.data.redis.lettuce.shutdown-timeout=100ms
spring.data.redis.timeout=2000ms

# ===== TASK SCHEDULING CONFIGURATION =====
spring.task.scheduling.pool.size=10

# ===== HIBERNATE 6 GLOBAL ENUM MAPPING =====
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=12

