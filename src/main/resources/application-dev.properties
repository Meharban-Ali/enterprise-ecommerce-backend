# ===== DATABASE CONFIGURATION =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/redisdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===== HIBERNATE LOGGING LEVEL =====
logging.level.org.hibernate=WARN

# ===== REDIS CACHE =====
spring.cache.type=redis
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# ===== JAVA MAIL SENDER CONFIGURATION =====
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===== DATA INITIALIZER =====
app.data-initializer.enabled=true

# ===== JWT CONFIGURATION =====
app.jwt.secret=${JWT_SECRET:GvKKCNVuXaT5o64h5uC4PHfzgzUOmPlLEMoYGSPL5MwV1Xr5IbBnR1L7g/5L9mGOsgDTIKkSQ8W4hY6pkooWfw==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:1500000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ===== CORS CONFIGURATION =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# ===== ACTUATOR MONITORING =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.redis.enabled=true
management.health.db.enabled=true

# ===== SWAGGER/OPENAPI =====
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ===== FLYWAY DB MIGRATION =====
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===== HIBERNATE 6 ENUM MAPPING =====
spring.jpa.properties.hibernate.tool.schema.validate_types=false

# ===== BEAN OVERRIDING =====
spring.main.allow-bean-definition-overriding=true
