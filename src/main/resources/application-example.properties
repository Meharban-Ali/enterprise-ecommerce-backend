# ===================================================================
# eCommerce Backend Configuration Reference Template
# ===================================================================

# Database Configurations
spring.datasource.url=jdbc:mysql://localhost:3306/your_database
spring.datasource.username=your_database_username
spring.datasource.password=your_database_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hikari Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Caching configurations
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JavaMailSender configurations
spring.mail.host=smtp.yourprovider.com
spring.mail.port=587
spring.mail.username=your_smtp_username
spring.mail.password=your_smtp_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Cryptographic token settings
app.jwt.secret=your_base64_encoded_256_bit_jwt_signing_key
app.jwt.expiration-ms=1500000
app.jwt.refresh-expiration-ms=604800000

# Operations configurations
app.data-initializer.enabled=true

# Security configurations
app.security.rate-limit-enabled=false

# Actuator configurations
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=false
