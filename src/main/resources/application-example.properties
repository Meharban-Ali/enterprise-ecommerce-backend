# ===================================================================
# eCommerce Backend Configuration Reference Template
# ===================================================================

# Database Configurations
# JDBC URL to connect to the target MySQL database instance
spring.datasource.url=jdbc:mysql://localhost:3306/redisdb
# Database login credentials
spring.datasource.username=your_database_username
spring.datasource.password=your_database_password
# Driver class and SQL dialect selections
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hikari Connection Pool Settings
# Maximum number of connections Hikari maintains in the pool
spring.datasource.hikari.maximum-pool-size=20
# Minimum number of idle connections maintained
spring.datasource.hikari.minimum-idle=5

# Caching configurations
# Cache type selection (set to 'redis' for cache, 'simple' for local in-memory H2 checks)
spring.cache.type=redis
# Host name and port of the target Redis Cache server
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JavaMailSender configurations
# Host of the SMTP mail relay server
spring.mail.host=smtp.gmail.com
# Port used for connection (usually 587 for TLS, 465 for SSL)
spring.mail.port=587
# Mail account logins
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
# SMTP properties overrides
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Cryptographic token settings
# Base64 encoded 256-bit key used to sign JWT signatures
app.jwt.secret=1Fgi/zPX0upMYb170+pf2TVbYGKNVoQUr3MJKqQIzgg=
# Validity durations in milliseconds (access: 25 minutes, refresh: 7 days)
app.jwt.expiration-ms=1500000
app.jwt.refresh-expiration-ms=604800000

# Operations configurations
# Set true to preload default admin/user profiles database records on startup
app.data-initializer.enabled=true
