# ===== DATABASE CONFIGURATION (Hikari Connection Pool) =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===== REDIS CACHE (Connection Pool) =====
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}

# ===== JAVA MAIL SENDER CONFIGURATION =====
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ===== DATA INITIALIZER =====
app.data-initializer.enabled=false

# ===== JWT CONFIGURATION =====
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS}

# ===== CORS CONFIGURATION =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://ecommerce.com}

# ===== ACTUATOR MONITORING (Production - restricted) =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ===== SWAGGER/OPENAPI (Disabled in production by default) =====
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ===== LOGGING CONFIGURATION =====
logging.level.root=WARN
logging.level.com.redis=INFO
logging.level.org.hibernate=WARN

# ===== SERVER OPTIONS =====
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB
server.shutdown=graceful
