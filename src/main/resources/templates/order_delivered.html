<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Delivered</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f8fafc; color: #1e293b; padding: 20px; }
        .card { background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); padding: 40px; max-width: 600px; margin: 0 auto; }
        h1 { color: #16a34a; font-size: 24px; font-weight: 700; margin-bottom: 20px; }
        p { line-height: 1.6; margin-bottom: 20px; }
        .details { background-color: #f1f5f9; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .footer { font-size: 12px; color: #64748b; border-top: 1px solid #e2e8f0; padding-top: 20px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Order Delivered!</h1>
        <p>Hi <span th:text="${data.customerName}">User</span>,</p>
        <p>Your order has been successfully delivered. We hope you enjoy your purchase!</p>
        <div class="details">
            <p><strong>Order ID:</strong> <span th:text="${data.orderId}">0</span></p>
        </div>
        <div class="footer">
            <p>Best regards,<br><span th:text="${data.companyName}">E-Commerce Corp</span></p>
            <p>Need support? Contact us at: <span th:text="${data.supportContact}">support@ecommerce.com</span></p>
        </div>
    </div>
</body>
</html>
