# ==========================================================
# Test Profile Configuration (H2 memory DB + simple cache)
# This profile is loaded ONLY during test execution.
# ==========================================================

# Database: H2 in-memory database (MySQL mode)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.tool.schema.validate_types=false
spring.jpa.show-sql=true

# Cache: Use simple in-memory map instead of Redis for test isolation
spring.cache.type=simple

# Disable Automatic Data Initialization During Tests
app.data-initializer.enabled=false

# Exclude Redis autoconfig to prevent connection attempts during tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT Configuration (Test values)
app.jwt.secret=1Fgi/zPX0upMYb170+pf2TVbYGKNVoQUr3MJKqQIzgg=
app.jwt.expiration-ms=1500000
app.jwt.refresh-expiration-ms=604800000

# Allow Bean Definition Overriding
spring.main.allow-bean-definition-overriding=true

# Mail Configuration (Test stubbing)
spring.mail.host=localhost
spring.mail.port=25

# Disable Flyway during tests to maintain test isolation
spring.flyway.enabled=true
