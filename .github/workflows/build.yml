name: Java Build Validation

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
      - 'hotfix/*'
      - 'feature/*'
  pull_request:
    branches:
      - main
      - develop
      - 'release/*'
      - 'hotfix/*'

jobs:
  build:
    name: Compile, Quality Check & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant Execute Permissions on Maven Wrapper
        run: chmod +x mvnw

      - name: Run Secret Scanning
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          severity: 'HIGH,CRITICAL'
          format: 'table'

      - name: Compile and Quality Check (Checkstyle & SpotBugs)
        run: ./mvnw clean compile -Pquality-check

      - name: Package Application JAR
        run: ./mvnw package -Pquality-check -DskipTests

      - name: Run Dependency Vulnerability Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'
          format: 'table'

      - name: Upload Packaged Jar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-app-jar
          path: target/*.jar
          retention-days: 7
