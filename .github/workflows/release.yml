name: Production Release Workflow

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, Package, and Draft Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant Execute Permissions on Maven Wrapper
        run: chmod +x mvnw

      - name: Run Test Suite
        run: ./mvnw test "-DargLine=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:+UseG1GC"

      - name: Package Release JAR
        run: ./mvnw package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Release Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: meharbancoder/ecommerce-app:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release Draft
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          generate_release_notes: true
          files: |
            target/*.jar
            CHANGELOG.md
            LICENSE
