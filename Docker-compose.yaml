version: '3.8'

services:

  # ─── SERVICE 1: MySQL Database ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"                 # Host port 3307 → Container port 3306
    volumes:
      - mysql_data:/var/lib/mysql   # Named volume for persistent data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s

  # ─── SERVICE 2: Redis Cache ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine           # Alpine variant for minimal image size
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── SERVICE 3: Spring Boot Application ──────────────────────────────────────
  app:
    build: .
    image: meharbancoder/ecommerce-app:v1.0
    container_name: springboot_app
    ports:
      - "8085:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:dev}
      
      # Database Settings (Dev / Local)
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:redisdb}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:12345}
      
      # Database Settings (Prod)
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:redisdb}
      DB_USERNAME: ${MYSQL_USER:root}
      DB_PASSWORD: ${MYSQL_PASSWORD:12345}
      DB_POOL_MAX: ${DB_POOL_MAX:20}
      DB_POOL_MIN: ${DB_POOL_MIN:5}
      
      # Redis Cache Settings (Dev)
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      
      # Redis Cache Settings (Prod)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # JavaMailSender SMTP Settings
      SMTP_HOST: ${SMTP_HOST:localhost}
      SMTP_PORT: ${SMTP_PORT:25}
      SMTP_USERNAME: ${SMTP_USERNAME:}
      SMTP_PASSWORD: ${SMTP_PASSWORD:}
      
      # JWT Cryptographic Credentials
      JWT_SECRET: ${JWT_SECRET:GvKKCNVuXaT5o64h5uC4PHfzgzUOmPlLEMoYGSPL5MwV1Xr5IbBnR1L7g/5L9mGOsgDTIKkSQ8W4hY6pkooWfw==}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:1500000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:604800000}
      
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:https://ecommerce.com}
      
      # Super Admin Seeder settings
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:superadmin_user}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:superadmin@ecommerce.local}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:ComplexPassword@12345}
      SUPER_ADMIN_PHONE: ${SUPER_ADMIN_PHONE:+917505195491}
      
      # Security & Probes Overrides
      APP_SECURITY_RATE_LIMIT_ENABLED: ${APP_SECURITY_RATE_LIMIT_ENABLED:true}
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: ${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
    depends_on:
      mysql:
        condition: service_healthy  # Wait for MySQL healthcheck before starting app
      redis:
        condition: service_healthy  # Wait for Redis healthcheck before starting app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s             # Allow Spring Boot sufficient time to initialize
    networks:
      - app-network

# ─── VOLUMES ─────────────────────────────────────────────────────────────────
volumes:
  mysql_data:                       # Persistent MySQL data volume

# ─── NETWORKS ────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge                  # Private bridge network for inter-container communication
